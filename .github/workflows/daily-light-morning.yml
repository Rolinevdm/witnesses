name: "Send Today's Morning Daily Light out!"

on:
  # Run once per day at 01:23 UTC
  schedule:
    - cron: '23 1 * * *'
  # Allow manual execution
  workflow_dispatch:

jobs:
  send-daily-light-morning:
    runs-on: ubuntu-22.04

    steps:
      - name: Show Python Version
        run: python3 --version

      - name: Install Python Dependencies
        run: |
          sudo python3 -m pip install --upgrade pip
          sudo pip3 install telegram-send==0.25 python-telegram-bot==13.5

      - name: Setup gitHub User Details
        uses: octoleo/git-user@v2
        with:
          gpg-key: ${{ secrets.GPG_KEY }}
          gpg-user: ${{ secrets.GPG_USER }}
          ssh-key: ${{ secrets.SSH_KEY }}
          ssh-pub: ${{ secrets.SSH_PUB }}
          git-user: ${{ secrets.GIT_USER }}
          git-email: ${{ secrets.GIT_EMAIL }}

      - name: Clone Master Repository
        run: git clone git@github.com:trueChristian/witnesses.git witnesses

      - name: Send Daily Light (Morning) To Telegram
        env:
          BOT_CONF: ${{ secrets.TG_DAILYLIGHT_BOT_CONF }}
        run: |
          cd witnesses
          ./src/telegram.sh \
            --bot-conf "$BOT_CONF" \
            --message-url "https://raw.githubusercontent.com/trueChristian/daily-light/master/morning.html" \
            --format html

